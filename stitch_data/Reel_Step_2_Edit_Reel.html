<!DOCTYPE html>

<html class="dark" lang="en"><head>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">

                    colors: {
                        "primary": "#ec5b13",
                        "instagram-blue": "#0095F6",
                        "background-light": "#f8f6f6",
                        "background-dark": "#000000",
                        "surface-dark": "#1A1A1A",

                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},

        }

<title>Edit Reel</title>
<style>

  </style>

<span class="material-symbols-outlined text-4xl fill-1">play_arrow</span>
</button>
<!-- Video Progress Indicator -->

</div>
</div>

</div>

</div>
<span class="text-[11px] text-slate-300">Speed</span>
</div>
</div>
</div>

</div>

<div class="shrink-0 text-slate-500">
<span class="material-symbols-outlined">chevron_right</span>

</div>

<div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-32 h-1 bg-white/20 rounded-full"></div>
</div>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {

            scrollbar-width: none;
