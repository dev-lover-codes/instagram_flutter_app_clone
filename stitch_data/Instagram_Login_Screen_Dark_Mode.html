<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0095F6",
                        "background-light": "#ffffff",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .instagram-gradient {
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
        }
        .instagram-font {
            font-family: 'Public Sans', sans-serif;
            font-weight: 700;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-slate-100 flex items-center justify-center min-h-screen">
<div class="w-[375px] h-[812px] bg-black flex flex-col items-center px-8 relative overflow-hidden">
<!-- Top Spacer -->
<div class="h-24"></div>
<!-- Logo -->
<div class="instagram-gradient w-20 h-20 rounded-2xl flex items-center justify-center mb-6">
<div class="w-16 h-16 border-[5px] border-white rounded-2xl flex items-center justify-center relative">
<div class="w-8 h-8 border-[5px] border-white rounded-full"></div>
<div class="w-1.5 h-1.5 bg-white rounded-full absolute top-1 right-1"></div>
</div>
</div>
<!-- Instagram Text -->
<h1 class="text-white text-[36px] font-bold tracking-tight mb-10">Instagram</h1>
<!-- Form -->
<div class="w-full flex flex-col gap-3">
<div class="relative">
<input class="w-full h-11 bg-white/10 border border-white/30 rounded-lg px-4 text-sm text-white placeholder:text-slate-400 focus:outline-none focus:border-white/50 transition-colors" placeholder="Phone number, username or email" type="text"/>
</div>
<div class="relative">
<input class="w-full h-11 bg-white/10 border border-white/30 rounded-lg px-4 pr-12 text-sm text-white placeholder:text-slate-400 focus:outline-none focus:border-white/50 transition-colors" placeholder="Password" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 cursor-pointer text-[20px]">
                    visibility
                </span>
</div>
<button class="w-full h-11 bg-primary text-white font-semibold rounded-lg text-sm mt-2 active:opacity-90 transition-opacity">
                Log In
            </button>
<a class="text-primary text-[13px] font-medium text-center mt-3 block" href="#">
                Forgot password?
            </a>
</div>
<!-- Divider -->
<div class="w-full flex items-center gap-4 my-8">
<div class="h-[1px] flex-1 bg-white/20"></div>
<span class="text-slate-400 text-xs font-bold">OR</span>
<div class="h-[1px] flex-1 bg-white/20"></div>
</div>
<!-- Facebook Login -->
<button class="flex items-center gap-2 text-primary font-semibold text-sm">
<svg fill="currentColor" height="20" viewbox="0 0 24 24" width="20">
<path d="M22.675 0h-21.35c-.732 0-1.325.593-1.325 1.325v21.351c0 .731.593 1.324 1.325 1.324h11.495v-9.294h-3.128v-3.622h3.128v-2.671c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12v9.293h6.116c.73 0 1.323-.593 1.323-1.325v-21.35c0-.732-.593-1.325-1.325-1.325z"></path>
</svg>
            Log in with Facebook
        </button>
<!-- Footer / Sign Up -->
<div class="absolute bottom-0 left-0 w-full p-6 border-t border-white/10 flex justify-center">
<p class="text-slate-400 text-sm">
                Don't have an account? <a class="text-primary font-semibold" href="#">Sign up</a>
</p>
</div>
</div>
</body></html>
