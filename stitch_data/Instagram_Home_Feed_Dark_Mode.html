<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Instagram Dark Mode Clone</title>
<!-- BEGIN: Tailwind Setup -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'ig-black': '#000000',
            'ig-elevated': '#121212',
            'ig-border': 'rgba(255, 255, 255, 0.15)',
          },
          fontFamily: {
            'billabong': ['Billabong', 'cursive', 'system-ui'],
          }
        }
      }
    }
  </script>
<!-- END: Tailwind Setup -->
<!-- BEGIN: Custom Typography Styles -->
<style data-purpose="typography">
    @font-face {
      font-family: 'Billabong';
      src: url('https://fonts.cdnfonts.com/s/15444/Billabong.woff') format('woff');
    }
    .instagram-logo {
      font-family: 'Billabong', cursive;
      font-size: 28px;
    }
    .verified-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #0095f6;
      border-radius: 50%;
      width: 12px;
      height: 12px;
      margin-left: 4px;
    }
    .verified-badge::after {
      content: '✓';
      color: white;
      font-size: 8px;
      font-weight: bold;
    }
  </style>
<!-- END: Custom Typography Styles -->
<!-- BEGIN: Component Layout Styles -->
<style data-purpose="layout">
    body {
      background-color: #000000;
      color: white;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .iphone-container {
      width: 375px;
      height: 812px;
      background: #000000;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .story-ring {
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      padding: 2px;
    }
    .live-pill {
      background: linear-gradient(to right, #D22463, #E10038);
      font-size: 8px;
      padding: 1px 4px;
      border-radius: 2px;
      border: 1px solid black;
    }
    /* Hide scrollbar for story tray */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
<!-- END: Component Layout Styles -->
</head>
<body>
<!-- BEGIN: Phone Mockup Container -->
<div class="iphone-container border border-gray-800 rounded-[40px] shadow-2xl overflow-hidden">
<!-- BEGIN: Top Bar -->
<header class="h-[88px] bg-ig-elevated flex items-end pb-2 px-4 border-b-[0.33px] border-ig-border" data-purpose="navigation-header">
<div class="flex justify-between items-center w-full h-11">
<!-- Left: Camera -->
<div class="w-[24px] h-[22px]">
<svg fill="none" height="22" viewbox="0 0 24 22" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M21 6H17.7L15.6 3H8.4L6.3 6H3C1.9 6 1 6.9 1 8V18C1 19.1 1.9 20 3 20H21C22.1 20 23 19.1 23 18V8C23 6.9 22.1 6H21Z" stroke="white" stroke-width="2"></path>
<circle cx="12" cy="13" r="4" stroke="white" stroke-width="2"></circle>
</svg>
</div>
<!-- Center: Logo -->
<div class="instagram-logo text-white pt-1">Instagram</div>
<!-- Right: IGTV & DM -->
<div class="flex items-center space-x-4">
<div class="relative">
<svg fill="none" height="24" stroke="white" stroke-width="2" viewbox="0 0 24 24" width="24">
<rect height="14" rx="3" width="20" x="2" y="5"></rect>
<path d="M10 10l5 2-5 2V10z" fill="white"></path>
</svg>
<div class="absolute -top-1 -right-1 w-2 h-2 bg-red-600 rounded-full border border-black"></div>
</div>
<svg fill="none" height="24" stroke="white" stroke-width="2" viewbox="0 0 24 24" width="24">
<path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
</div>
</header>
<!-- END: Top Bar -->
<!-- BEGIN: Main Feed Content -->
<main class="flex-1 overflow-y-auto no-scrollbar">

</div>
<span class="text-[11px] text-white mt-1">wanderlust</span>
</div>
<!-- Normal Story 2 -->
<div class="flex flex-col items-center flex-shrink-0">
<div class="story-ring rounded-full w-[60px] h-[60px] flex items-center justify-center">
<img alt="User 3" class="rounded-full w-[54px] h-[54px] border-2 border-black object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBEjQ-dmixBD_lq8xxZA_fJaqUKwPk0DlKxGmjB0Sav8X90UTasv4uXhGoCnNT4Lv-L3Un8ScVKLcWF-z4_G6jyphZcJFG4YAzseQhtb9kRW6DTrB2k_RCr7-rf7Z2ZkHf-b-o2MpSWSOn9P8-V3XWpcI2SgUZVvPuBpVPYExb2Iz5gVisZd3SWf_JZJmlKhveohywq5UHUIGY3A3Vp1eyTlkyAc_pM9Ona-RfbCj8hber2DWcKTZhF0HrMSwGBxKYj5cFZqFw-waU"/>

<div class="p-3 space-y-3">
<div class="flex items-center justify-between">

<!-- Heart -->

</svg>
</div>
<!-- Pagination dots -->

<div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div>
